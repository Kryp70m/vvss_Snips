<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VolSnipe V2 - Institutional SMC Dashboard</title>
    <style>
        body { background: #0e1118; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .grid-container { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; height: 95vh; }
        .alert-panel { background: #141a24; border-radius: 6px; padding: 15px; overflow-y: auto; }
        .chart-panel { background: #141a24; border-radius: 6px; overflow: hidden; }
        .alert-card { background: #1c2434; border-left: 4px solid #00ff88; margin-bottom: 10px; padding: 12px; border-radius: 4px; cursor: pointer; }
        .alert-card.SHORT { border-left-color: #ff3366; }
        .badge { background: #00ff88; color: #000; font-size: 11px; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="grid-container">
    <div class="alert-panel" id="alertContainer">
        <h2>SMC Live Signals Matrix</h2>
        <div class="alert-card" onclick="loadChart('BINANCE:POWRUSDT')">
            <div><span class="badge">HIGH CONVICTION LONG</span> <strong>POWRUSDT</strong></div>
            <div style="font-size: 13px; margin-top: 5px; color: #b0b8c4;">Entry Zone: FVG Mitigation Block. SMT Trap Evaluated.</div>
        </div>
    </div>
    <div class="chart-panel" id="tv_chart_container"></div>
</div>

<script>
    let currentWidget = null;

    function loadChart(symbol) {
        currentWidget = new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tv_chart_container"
        });
    }

    // Initialize with standard project baseline index asset
    loadChart("BINANCE:BTCUSDT");
</script>
</body>
</html>
